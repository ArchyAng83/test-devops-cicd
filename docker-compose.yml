services:
  web-api:
    image: my-test-app:latest
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=test_ci_db;Username=user;Password=pass
      - ConnectionStrings__Redis=cache:6379
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
      - cache

  db:
    image: postgres:latest
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: test_ci_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  postgres_data:
